name: Auto-Update Articles

on:
  schedule:
    # 每天 UTC 2:00 运行 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run article update script
        run: node scripts/update-articles.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TZ: 'Asia/Shanghai'

      - name: Build
        run: npm run build

      - name: Commit and push changes
        run: |
          git config user.name "HiHubei Bot"
          git config user.email "bot@hihubei.com"
          git add src/data/articles.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update articles ($(date +'%Y-%m-%d'))"
            git push origin main
            echo "✅ New articles committed and pushed"
          fi
